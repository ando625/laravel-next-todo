

services:
  nginx:
    image: nginx:1.21.1
    ports:
      - "${NGINX_PORT:-80}:80"   # ← ${変数名:-デフォルト値} という書き方
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./laravel:/var/www/
    depends_on:
      - php

  php:
    build: ./docker/php
    volumes:
      - ./laravel:/var/www/
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini

  next:
    image: node:20
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules 

    working_dir: /app
    ports:
      - "${NEXTJS_PORT:-3000}:3000"   # ← ここも変数に！
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}   # ← Next.jsに渡す

  mysql:
    image: mysql:8.0.26
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}   # ← 変数に！
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=${PMA_HOST}         # ← 変数に！
      - PMA_USER=${PMA_USER}
      - PMA_PASSWORD=${PMA_PASSWORD}
    depends_on:
      - mysql
    ports:
      - "${PHPMYADMIN_PORT:-8888}:80"

# nextはbild前はコメントアウトしてfrontendの中（docker compose run --rm next sh）に入って（npx create-next-app@latest）インストールしてからコメントアウトを外す　クローはこのまま外してクローンできる最初だけ自分でインストールする